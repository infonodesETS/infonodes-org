name: Genera indice e knowledge base

on:
  push:
    branches: [master]
    paths:
      - 'pubblicazioni/**'
      - 'MARLA/**'
      - 'archivio/**'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze sistema (OCR)
        run: sudo apt-get install -y tesseract-ocr tesseract-ocr-ita poppler-utils

      - name: Installa dipendenze Python
        run: pip install -r scripts/requirements.txt

      - name: Genera search-index.json
        run: python scripts/genera_indice.py

      - name: Genera kb.json (memoria di MARLA)
        run: python scripts/costruisci_kb.py

      - name: Pubblica i file aggiornati
        run: |
          git config user.name  "infonodes-bot"
          git config user.email "bot@infonodes.org"
          git add search-index.json kb.json
          git diff --cached --quiet && echo "Nessuna modifica." || (
            git commit -m "Auto: aggiorna indice e knowledge base [skip ci]" &&
            git pull --rebase &&
            git push
          )
